<!DOCTYPE html>
<html>
<head>
    <title>Employee Data</title>
</head>
<body style="background-color: #b0b0b0; font-family: sans-serif;">

    <form style="width: 700px; padding: 20px;">
        <center><h1><i>Employee Data</i></h1></center>

        <table width="100%" cellpadding="5">
            <tr>
                <td>Employee ID: <input type="text" name="emp_id" value="102"></td>
                <td>Birth Date: <input type="text" name="birth_date" value="06/05/1962"></td>
            </tr>
            <tr>
                <td>Manager ID: <input type="text" name="mgr_id" value="501"></td>
                <td>Soc. Sec. No.: <input type="text" name="ssn" value="017-34-9033"></td>
            </tr>
            <tr>
                <td>Emp. First Name: <input type="text" name="fname" value="Fran" style="width: 200px;"></td>
                <td>Salary: <input type="text" name="salary" value="$45,700.00"></td>
            </tr>
            <tr>
                <td>Emp. Last Name: <input type="text" name="lname" value="Whitney" style="width: 200px;"></td>
                <td>Start Date: <input type="text" name="start_date" value="02/26/1990"></td>
            </tr>
            <tr>
                <td>Department ID: <input type="text" name="dept_id" value="100"></td>
                <td>Termination Date: <input type="text" name="term_date" value="00/00/0000"></td>
            </tr>
            <tr>
                <td>Street: <input type="text" name="street" value="49 East Washington Street" style="width: 250px;"></td>
                <td>Status: <br>
                    <input type="radio" name="status" checked> Active <br>
                    <input type="radio" name="status"> Terminated <br>
                    <input type="radio" name="status"> On Leave
                </td>
            </tr>
            <tr>
                <td>City: <input type="text" name="city" value="Needham"></td>
                <td>Health Insurance: <input type="checkbox" checked></td>
            </tr>
            <tr>
                <td>State: <input type="text" name="state" value="MA" style="width: 50px;"></td>
                <td>Life Insurance: <input type="checkbox" checked></td>
            </tr>
            <tr>
                <td>Zip Code: <input type="text" name="zip" value="02192-"></td>
                <td>Day Care: <input type="checkbox"></td>
            </tr>
            <tr>
                <td>Phone: <input type="text" name="phone" value="(617) 555-3985"></td>
                <td></td>
            </tr>
            <tr>
                <td>Sex: 
                    <input type="radio" name="sex"> Male
                    <input type="radio" name="sex" checked> Female
                </td>
                <td></td>
            </tr>
        </table>

    </form>
</body>
</html>
